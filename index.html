<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qishi's Path of Destiny</title>
    <style>
        body { background: #020617; color: #f8fafc; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        h1 { margin-top: 20px; color: #38bdf8; font-weight: 300; letter-spacing: 3px; font-size: 1.5rem; }
        #game-container { position: relative; width: 100vw; height: 60vh; display: flex; justify-content: center; align-items: center; }
        canvas { border: 1px solid #1e293b; background: #000; box-shadow: 0 0 30px rgba(56, 189, 248, 0.1); width: 360px; height: 360px; }
        #score-board { font-size: 1rem; margin: 10px; color: #64748b; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.95); justify-content: center; align-items: center; z-index: 100; padding: 20px; box-sizing: border-box; }
        .modal { background: #0f172a; padding: 30px; border-radius: 24px; border: 1px solid #38bdf8; max-width: 450px; width: 100%; text-align: center; }
        h3 { color: #38bdf8; line-height: 1.5; font-size: 1.2rem; margin-bottom: 20px; }
        .choice-btn { background: #1e293b; color: #f8fafc; border: 1px solid #38bdf8; padding: 14px; margin: 8px 0; cursor: pointer; border-radius: 12px; font-size: 14px; width: 100%; display: block; transition: all 0.2s; }
        .choice-btn:active { background: #38bdf8; color: #020617; }
        #outcome-text { margin-top: 20px; line-height: 1.6; color: #94a3b8; font-style: italic; font-size: 0.95rem; }
        
        #final-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; color: white; justify-content: center; align-items: center; z-index: 200; padding: 30px; text-align: center; box-sizing: border-box; }
        .destiny-title { font-size: 1.8rem; color: #38bdf8; margin-bottom: 25px; font-weight: bold; }
        .destiny-body { font-size: 1.1rem; line-height: 2; max-width: 550px; color: #cbd5e1; }
        .next-step { color: #38bdf8; font-size: 1.4rem; margin-top: 30px; font-weight: 300; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>PATH OF DESTINY</h1>
    <div id="score-board">Experience: <span id="score">0</span></div>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div id="overlay">
        <div class="modal">
            <h3 id="question-text"></h3>
            <div id="buttons"></div>
            <p id="outcome-text"></p>
            <button id="continue-btn" style="display:none; background:#38bdf8; color:#020617; border:none; padding:12px 40px; border-radius:30px; cursor:pointer; margin-top:20px; font-weight:bold; width:100%;">Step into the Next Phase</button>
        </div>
    </div>

    <div id="final-screen">
        <div>
            <div class="destiny-title">THE CONFLUENCE</div>
            <div class="destiny-body" id="final-text"></div>
            <div class="next-step">WHAT'S NEXT?</div>
            <button onclick="location.reload()" style="margin-top:50px; background:none; border:1px solid #334155; color:#64748b; padding:8px 20px; border-radius:20px; cursor:pointer;">Restart Journey</button>
        </div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreElement = document.getElementById("score");

let snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
let food = {x: 5, y: 5};
let dx = 0, dy = -1;
let score = 0;
let gamePaused = false;

const plots = [
    {
        trigger: 1,
        question: "High school biology was a world of wonder. Do you follow that initial spark?",
        choices: ["Embrace Biology.", "Seek a different path."],
        outcome: "The fascination for life won. You embarked on a four-year odyssey through laboratories and oceans."
    },
    {
        trigger: 3,
        question: "The lab feels too small for your curiosity. Where does your drive take you?",
        choices: ["Stay in the lab.", "Enter the Commercial world."],
        outcome: "You chose the vastness of the market. Seven years of professional success proved your resilience."
    },
    {
        trigger: 6,
        question: "The 'ceiling' appears. A Master's in the US is a leap into the unknown. Are you ready?",
        choices: ["Maintain stability.", "Cross the ocean."],
        outcome: "You sacrificed comfort for growth. A new continent, a new language—the language of data."
    },
    {
        trigger: 9,
        question: "Internship ends. A mentor offers a PhD in Mathematics. Do you choose the hardest path?",
        choices: ["Find a job.", "Embrace the rigor of Math."],
        outcome: "From the organic complexity of Biology to the pure logic of Mathematics. You've come full circle."
    }
];

let currentPlotIdx = 0;

function main() {
    if(gamePaused) return;
    if (currentPlotIdx >= plots.length && score >= 12) {
        showFinalEnding();
        return;
    }
    setTimeout(function onTick() {
        clearCanvas();
        drawFood();
        advanceSnake();
        drawSnake();
        checkPlot();
        main();
    }, 200); 
}

function checkPlot() {
    if (currentPlotIdx < plots.length && score >= plots[currentPlotIdx].trigger) {
        gamePaused = true;
        showModal(plots[currentPlotIdx]);
    }
}

function showModal(plot) {
    const overlay = document.getElementById("overlay");
    const qText = document.getElementById("question-text");
    const btnContainer = document.getElementById("buttons");
    const outcomeText = document.getElementById("outcome-text");
    const continueBtn = document.getElementById("continue-btn");

    qText.innerText = plot.question;
    outcomeText.innerText = "";
    continueBtn.style.display = "none";
    btnContainer.innerHTML = "";
    btnContainer.style.display = "block";

    plot.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.innerText = choice;
        btn.onclick = () => {
            btnContainer.style.display = "none";
            outcomeText.innerText = plot.outcome;
            continueBtn.style.display = "block";
            continueBtn.onclick = () => {
                overlay.style.display = "none";
                currentPlotIdx++;
                score++;
                gamePaused = false;
                main();
            };
        };
        btnContainer.appendChild(btn);
    });
    overlay.style.display = "flex";
}

function showFinalEnding() {
    const finalScreen = document.getElementById("final-screen");
    const finalText = document.getElementById("final-text");
    finalScreen.style.display = "flex";
    finalText.innerHTML = `
        <p>Your journey was never a calculation, but a series of courageous leaps.</p>
        <p>From the sunlight in a biology classroom to the deep abstraction of a <b>Mathematics PhD</b>.</p>
        <p>You have gathered the fragments of your past—biology, commerce, and statistics—into a singular, powerful direction.</p>
    `;
}

function advanceSnake() {
    const head = {x: snake[0].x + dx, y: snake[0].y + dy};
    if (head.x < 0) head.x = 19;
    if (head.x > 19) head.x = 0;
    if (head.y < 0) head.y = 19;
    if (head.y > 19) head.y = 0;
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
        score++;
        scoreElement.innerText = score;
        createFood();
    } else { 
        if(dx !== 0 || dy !== 0) snake.pop(); 
    }
}

function clearCanvas() { ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
function drawSnake() { 
    snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? "#38bdf8" : "#0f172a";
        ctx.strokeStyle = "#1e293b";
        ctx.fillRect(part.x * 20, part.y * 20, 18, 18);
        ctx.strokeRect(part.x * 20, part.y * 20, 18, 18);
    });
}
function createFood() { 
    food = {x: Math.floor(Math.random() * 19), y: Math.floor(Math.random() * 19)};
    if (snake.some(p => p.x === food.x && p.y === food.y)) createFood();
}
function drawFood() { ctx.fillStyle = "#f43f5e"; ctx.beginPath(); ctx.arc(food.x*20+10, food.y*20+10, 8, 0, Math.PI*2); ctx.fill(); }

window.onkeydown = e => {
    if (gamePaused) return;
    if (e.keyCode === 37 && dx !== 1) { dx = -1; dy = 0; }
    if (e.keyCode === 38 && dy !== 1) { dx = 0; dy = -1; }
    if (e.keyCode === 39 && dx !== -1) { dx = 1; dy = 0; }
    if (e.keyCode === 40 && dy !== -1) { dx = 0; dy = 1; }
};

let touchStartX = 0; let touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, false);
document.addEventListener('touchmove', e => {
    if(!touchStartX || !touchStartY || gamePaused) return;
    let dxT = e.touches[0].clientX - touchStartX; let dyT = e.touches[0].clientY - touchStartY;
    if (Math.abs(dxT) > Math.abs(dyT)) { 
        if(dxT > 0 && dx !== -1) {dx=1; dy=0;} 
        else if(dxT < 0 && dx !== 1) {dx=-1; dy=0;} 
    } else { 
        if(dyT > 0 && dy !== -1) {dx=0; dy=1;} 
        else if(dyT < 0 && dy !== 1) {dx=0; dy=-1;} 
    }
    touchStartX = 0; touchStartY = 0;
}, false);

createFood();
main();
</script>
</body>
</html>
